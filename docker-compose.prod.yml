services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: evenup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evenup_dev}
      POSTGRES_DB: evenup
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evenup']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://evenup:${POSTGRES_PASSWORD:-evenup_dev}@db:5432/evenup
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      PORT: '4000'
      CORS_ORIGIN: https://${DOMAIN:-localhost}
      APP_URL: ${APP_URL:-https://${DOMAIN:-localhost}}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    healthcheck:
      test: ['CMD', 'wget', '-q', '-O', '-', 'http://127.0.0.1:4000/api/health']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    # No published port: nginx (web) proxies /api/* internally; only caddy is public.

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ''
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # No published port: caddy is the public entrypoint and proxies to this service.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
