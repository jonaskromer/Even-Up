services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: evenup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evenup_dev}
      POSTGRES_DB: evenup
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evenup']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
