server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — applied at server level; repeated in location blocks that
    # define their own add_header (nginx doesn't inherit into child blocks otherwise).
    add_header X-Content-Type-Options      "nosniff"                            always;
    add_header X-Frame-Options             "DENY"                               always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' CSP_SCRIPT_HASHES; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
        always;

    # Reverse-proxy API calls to the api container (same-origin, no CORS needed)
    location /api/ {
        # nginx defaults to 1MB, which rejects receipt-photo uploads (@fastify/multipart
        # allows up to 10MB — see apps/api/src/app.ts) with a 413 before the request
        # ever reaches the API. 11MB gives a small margin over that limit so nginx never
        # rejects something the API would have accepted.
        client_max_body_size 11m;
        # POST /api/groups/:groupId/receipts/parse retries Gemini up to 3 times
        # (120s timeout each) before falling back to a secondary model — well past
        # nginx's 60s default, which would otherwise cut the connection with a 504
        # while a legitimate slow-but-successful parse is still in progress.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # That same endpoint streams newline-delimited JSON progress events as they
        # happen; nginx's default buffering would hold the whole response until it
        # completes, silently defeating the live retry/fallback progress UI.
        proxy_buffering off;
        proxy_pass http://api:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively — must repeat security headers
    location /assets/ {
        expires 1y;
        add_header Cache-Control              "public, immutable"                     always;
        add_header X-Content-Type-Options     "nosniff"                               always;
        add_header X-Frame-Options            "DENY"                                  always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"       always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' CSP_SCRIPT_HASHES; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
            always;
    }

    # Don't cache index.html — must repeat security headers
    location = /index.html {
        add_header Cache-Control              "no-cache"                              always;
        add_header X-Content-Type-Options     "nosniff"                               always;
        add_header X-Frame-Options            "DENY"                                  always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"       always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' CSP_SCRIPT_HASHES; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
            always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
