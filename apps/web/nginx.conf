server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers — applied at server level; repeated in location blocks that
    # define their own add_header (nginx doesn't inherit into child blocks otherwise).
    add_header X-Content-Type-Options      "nosniff"                            always;
    add_header X-Frame-Options             "DENY"                               always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' CSP_SCRIPT_HASHES; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
        always;

    # Reverse-proxy API calls to the api container (same-origin, no CORS needed)
    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively — must repeat security headers
    location /assets/ {
        expires 1y;
        add_header Cache-Control              "public, immutable"                     always;
        add_header X-Content-Type-Options     "nosniff"                               always;
        add_header X-Frame-Options            "DENY"                                  always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"       always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' CSP_SCRIPT_HASHES; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
            always;
    }

    # Don't cache index.html — must repeat security headers
    location = /index.html {
        add_header Cache-Control              "no-cache"                              always;
        add_header X-Content-Type-Options     "nosniff"                               always;
        add_header X-Frame-Options            "DENY"                                  always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"       always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' CSP_SCRIPT_HASHES; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; connect-src 'self' https://*.supabase.co; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
            always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
